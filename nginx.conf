# Nginx configuration for j88ks/J88 Web App (aaPanel)
# Domain: h12368.com
# Server: 159.223.91.150
# Path: /home/j88/public_html

server {
    listen 80;
    listen [::]:80;
    server_name h12368.com www.h12368.com;

    # Root directory - Expo web build output
    root /home/j88/public_html/dist;
    index index.html index.htm;

    # Charset
    charset utf-8;

    # Access and error logs
    access_log /www/wwwlogs/h12368.com.log;
    error_log /www/wwwlogs/h12368.com.error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Main location - SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy (if you have a backend API)
    # Uncomment and adjust if needed
    # location /api/ {
    #     proxy_pass http://127.0.0.1:8082;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    #     proxy_read_timeout 300s;
    #     proxy_connect_timeout 75s;
    # }

    # Favicon and icons
    location = /favicon.ico {
        alias /home/j88/public_html/dist/assets/images/favicon.ico;
        access_log off;
        log_not_found off;
        expires 30d;
    }

    location = /icon.png {
        alias /home/j88/public_html/dist/assets/images/icon.png;
        access_log off;
        expires 30d;
    }

    # Static assets caching - long cache for versioned files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # HTML, JSON, XML - no cache for dynamic content
    location ~* \.(html|json|xml|manifest|appcache)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Deny access to sensitive files
    location ~* \.(txt|log|md|env|git|gitignore|htaccess|htpasswd)$ {
        deny all;
    }

    # Deny access to executable files
    location ~ \.(php|pl|cgi|py|asp|aspx|jsp|sh|rb|perl|exe|bat|cmd)$ {
        deny all;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Custom error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /home/j88/public_html/dist;
    }

    # Increase upload size if needed
    client_max_body_size 50M;
}

